name : Frontend CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/fashion-d2c-app/frontend/**'

# Environment variables (Global, accessible to all jobs)
env:
  GHCR_REGISTRY: ghcr.io/${{ github.repository }}
  FRONTEND_IMAGE: nextjs-frontend

jobs:

  # ================
  # JOB 1: FRONTEND 
  # ================

  builds-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Build Frontend Docker Image
        run: |
          cd app/fashion-d2c-app/frontend
          docker build -t $GHCR_REGISTRY/${{ env.FRONTEND_IMAGE }}:latest .
          docker tag $GHCR_REGISTRY/${{ env.FRONTEND_IMAGE }}:latest $GHCR_REGISTRY/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push Frontend Image
        run: |
          docker push $GHCR_REGISTRY/${{ env.FRONTEND_IMAGE }}:latest
          docker push $GHCR_REGISTRY/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
    
  # =========================================================
  # JOB 2: DEPLOY (Runs when both parallel jobs are success)
  # =========================================================

  deploy:
    runs-on: ubuntu-latest
    needs: [builds-frontend] # <--- IMP: waits until both job are executed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only runs on main branch

    steps:
      - name: Deploy to Remote EC2 Server
        env: 
          MYSQL_DOTENV: ${{ secrets.MYSQL_DOTENV }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOSTS }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting Deployment on EC2..."
            
            TARGET_DIR="/home/ubuntu/deploy-sheild"
            REPO_URL="https://github.com/swapnil-lakra/deploy-sheild.git"

            echo "Checking if repository directory exists..."

            # Check agar directory exist karti hai (-d flag se)
            if [ -d "$TARGET_DIR" ]; then
              echo "⚠️ Old directory found at $TARGET_DIR. Deleting it..."
              # Purani directory ko remove karna
              sudo rm -rf "$TARGET_DIR"
              echo "✅ Old directory deleted successfully."
            else
              echo "✨ No existing directory found. Proceeding with clean clone."
            fi

            # /home/ubuntu directory me switch karein jahan clone karna hai
            cd /home/ubuntu || exit 1

            echo "🚀 Cloning repository from $REPO_URL..."
            git clone "$REPO_URL"

            # Project ke andar automatic navigate karne ke liye
            if [ -d "$TARGET_DIR/app/fashion-d2c-app/" ]; then
              cd "$TARGET_DIR/app/fashion-d2c-app/" || exit 1
              echo "📂 Switched to working directory: $(pwd)"
            else
              echo "❌ Error: Expected internal directory layout not found!"
              exit 1
            fi
            
            cat << 'EOF' | sudo tee $TARGET_DIR/app/fashion-d2c-app/.env
            ${{ env.MYSQL_DOTENV }}
            EOF
            
            # pull latest images
            docker pull $GHCR_REGISTRY/${{ env.BACKEND_IMAGE }}:latest

            # Stop old containers and start new ones
            docker compose -f docker-compose.yaml down || true
            docker compose -f docker-compose.yaml up -d --force-recreate

            echo "✅ Frontend Deployment Completed Successfully!"



    